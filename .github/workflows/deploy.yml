name: Deploy to cPanel (SSH/rsync)

on:
  push:
    branches:
      - main # Change this if your default branch has a different name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Updated to '22' to fix the deprecation warnings
          cache: 'npm'
          cache-dependency-path: maintenance-page/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: maintenance-page

      - name: Build Project
        run: npm run build
        working-directory: maintenance-page

      - name: Deploy via SSH (rsync)
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          # This is the private key you added to GitHub Secrets
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          # Use the IP address for a direct, fast connection
          REMOTE_HOST: "65.108.142.88"
          REMOTE_USER: "mightint"
          # The local folder generated by 'next build'
          SOURCE: "maintenance-page/out/"
          # The absolute path on your server (from your cPanel screenshots)
          TARGET: "/home2/mightint/public_html/"
          # 'az' means Archive (recursive/perms) and Zip (compression)
          # '--delete' ensures old files on the server are removed if deleted locally
          ARGS: "-az --delete"
          # Exclude node_modules and git files just in case
          EXCLUDE: "/node_modules/, /.git/"