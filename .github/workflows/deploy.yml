name: Deploy to cPanel

on:
  push:
    branches:
      - main # Change this to your default branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: maintenance-page/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: maintenance-page

      - name: Build Project
        run: npm run build
        working-directory: maintenance-page

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Path to the 'out' folder generated by next build
          local-dir: maintenance-page/out/
          # The directory on your server (usually public_html)
          server-dir: public_html/